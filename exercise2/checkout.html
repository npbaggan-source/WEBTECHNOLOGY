<!DOCTYPE html>
<html>
<head>
    <title>ShopEasy - Checkout</title>
</head>

<body>

<header>
    <h1>Checkout</h1>
    <nav>
        <a href="index.html">Home</a> |
        <a href="products.html">Products</a> |
        <a href="checkout.html">Checkout</a>
    </nav>
    <hr>
</header>

<section>
    <h2>Billing Details</h2>

    <form>

        <fieldset>
            <legend>Personal Information</legend>

            Name: <br>
            <input type="text" required><br><br>

            Email: <br>
            <input type="email" required><br><br>

            Phone: <br>
            <input type="tel"><br><br>
        </fieldset>

        <fieldset>
            <legend>Payment Method</legend>

            <input type="radio" name="payment"> Credit Card <br>
            <input type="radio" name="payment"> Debit Card <br>
            <input type="radio" name="payment"> UPI <br><br>

            Card Number: <br>
            <input type="number"><br><br>
        </fieldset>

        <label>Order Progress:</label>
        <progress value="70" max="100"></progress><br><br>

        <input type="submit" value="Place Order">

    </form>
</section>

<section>
    <h3>Customer Support Audio</h3>
    <audio controls>
        <source src="sample.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>
</section>

<footer>
    <hr>
    <p>Thank you for shopping with ShopEasy!</p>
</footer>

</body>
</html>
