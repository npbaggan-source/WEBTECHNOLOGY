<!DOCTYPE html>
<html>
<head>
    <title>Colorful Calculators</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            text-align: center;
            color: white;
        }

        h2 {
            margin-top: 30px;
        }

        /* ================= BOX CALCULATOR ================= */
        .box-calculator {
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        #display {
            width: 100%;
            height: 45px;
            margin-bottom: 15px;
            text-align: right;
            font-size: 20px;
            border-radius: 8px;
            border: 2px solid #4e73df;
            padding-right: 10px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        button {
            height: 45px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Number Buttons */
        .num {
            background-color: #f8f9fc;
        }

        /* Operator Buttons */
        .op {
            background-color: #4e73df;
            color: white;
        }

        /* Equal Button */
        .equal {
            background-color: #1cc88a;
            color: white;
        }

        /* Clear Button */
        .clear {
            background-color: #e74a3b;
            color: white;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        /* ================= TEXT CALCULATOR ================= */
        .text-calculator {
            width: 320px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
            color: black;
        }

        .text-calculator input {
            width: 90%;
            padding: 8px;
            margin: 8px;
            border-radius: 8px;
            border: 2px solid #1cc88a;
        }

        .text-calculator button {
            padding: 8px 12px;
            margin: 5px;
            border-radius: 8px;
            background-color: #4e73df;
            color: white;
            border: none;
        }

        .text-calculator button:hover {
            background-color: #2e59d9;
        }

        #resultText {
            margin-top: 10px;
            font-weight: bold;
            color: #1cc88a;
        }

    </style>
</head>

<body>

    <h2>🌟 Colorful Box Calculator</h2>

    <div class="box-calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
            <button class="num" onclick="addValue('7')">7</button>
            <button class="num" onclick="addValue('8')">8</button>
            <button class="num" onclick="addValue('9')">9</button>
            <button class="op" onclick="addValue('/')">/</button>

            <button class="num" onclick="addValue('4')">4</button>
            <button class="num" onclick="addValue('5')">5</button>
            <button class="num" onclick="addValue('6')">6</button>
            <button class="op" onclick="addValue('*')">*</button>

            <button class="num" onclick="addValue('1')">1</button>
            <button class="num" onclick="addValue('2')">2</button>
            <button class="num" onclick="addValue('3')">3</button>
            <button class="op" onclick="addValue('-')">-</button>

            <button class="num" onclick="addValue('0')">0</button>
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="equal" onclick="calculate()">=</button>
            <button class="op" onclick="addValue('+')">+</button>
        </div>
    </div>

    <h2>🌟 Colorful Text Format Calculator</h2>

    <div class="text-calculator">
        <input type="number" id="num1" placeholder="Enter First Number"><br>
        <input type="number" id="num2" placeholder="Enter Second Number"><br>

        <button onclick="textCalculate('+')">Add</button>
        <button onclick="textCalculate('-')">Subtract</button>
        <button onclick="textCalculate('*')">Multiply</button>
        <button onclick="textCalculate('/')">Divide</button>

        <h3 id="resultText"></h3>
    </div>

    <script>
        function addValue(value) {
            document.getElementById("display").value += value;
        }

        function clearDisplay() {
            document.getElementById("display").value = "";
        }

        function calculate() {
            try {
                var exp = document.getElementById("display").value;
                document.getElementById("display").value = eval(exp);
            } catch {
                document.getElementById("display").value = "Error";
            }
        }

        function textCalculate(operator) {
            var n1 = parseFloat(document.getElementById("num1").value);
            var n2 = parseFloat(document.getElementById("num2").value);
            var result;

            if (operator == '+') result = n1 + n2;
            if (operator == '-') result = n1 - n2;
            if (operator == '*') result = n1 * n2;
            if (operator == '/') result = n1 / n2;

            document.getElementById("resultText").innerHTML = "Result: " + result;
        }
    </script>

</body>
</html>
